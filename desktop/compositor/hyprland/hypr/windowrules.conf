windowrule = float on, match:class = .*
windowrule = size 900 600, match:class = .*

## rofi wr's
windowrule = float on, match:class ^(rofi)$


# windowrules apps defaults

## Kitty
windowrule = float on, match:class ^(kitty)$
windowrule = size 900 580, match:class ^(kitty)$
windowrule = center on, match:class ^(kitty)$

## Thunar
windowrule = float on, match:class ^(thunar)$
windowrule = size 1000 650, match:class ^(thunar)$
windowrule = center on, match:class ^(thunar)$

## Telegram
windowrule = float on, match:class ^(org.telegram.desktop)$, match:title ^(Media viewer)$
windowrule = fullscreen off, match:class ^(org.telegram.desktop)$, match:title ^(Media viewer)$
windowrule = size 1200 800, match:class ^(org.telegram.desktop)$, match:title ^(Media viewer)$
windowrule = center on, match:class ^(org.telegram.desktop)$, match:title ^(Media viewer)$

## FIreFox
windowrule = no_blur on, match:class ^(firefox)$
